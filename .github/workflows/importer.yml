name: Knowledge Importer

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - "importer/**"
      - ".github/workflows/importer.yml"
      - "package.json"
      - "uka/**"

jobs:
  importer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run Knowledge Importer
        run: node importer/schema/import.js

      - name: Upload knowledge artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-internal
          path: importer/output/knowledge-internal.json
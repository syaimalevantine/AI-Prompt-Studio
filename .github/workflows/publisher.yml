name: Knowledge Publisher

on:
  workflow_dispatch:
  push:
    paths:
      - "publisher/**"
      - "importer/**"
      - "knowledge/**"
      - ".github/workflows/publisher.yml"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install

      - name: Run Knowledge Importer
        run: node importer/schema/import.js

      - name: Verify knowledge document
        run: test -s knowledge/knowledge.json

      - name: Run Knowledge Publisher
        run: node publisher/publish.js

      - name: Verify runtime package
        run: test -s runtime/knowledge-runtime.json

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-runtime
          path: runtime/knowledge-runtime.json
          if-no-files-found: error
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- SEO -->

    <title>AI Prompt Studio</title>

    <meta
        name="description"
        content="Type Ideas into Perfect Prompts">

    <meta
        name="author"
        content="Syaima Levantine">

    <meta
        name="theme-color"
        content="#F8F6F1">

    <!-- CSS -->

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- Header -->
    <!-- ===================================== -->

    <header class="site-header">

        <div class="container">

            <h1>AI Prompt Studio</h1>

            <p class="tagline">

                Type Ideas into Perfect Prompts

            </p>

        </div>

    </header>

    <!-- ===================================== -->
    <!-- Main -->
    <!-- ===================================== -->

    <main class="container app-layout">

        <!-- ================================= -->
        <!-- Prompt Workspace -->
        <!-- ================================= -->

        <section class="prompt-canvas">

            <h2>Prompt Canvas</h2>

            <p class="section-description">

                Transform your ideas into clear and effective AI prompts.

            </p>

            <div class="form-group">

                <label for="idea">

                    Your Idea

                </label>

                <textarea
                    id="idea"
                    placeholder="Describe your idea here..."></textarea>

            </div>

            <div class="form-group">

                <label for="tone">

                    Tone

                </label>

                <select id="tone">

                    <option>Professional</option>
                    <option>Friendly</option>
                    <option>Creative</option>
                    <option>Formal</option>
                    <option>Casual</option>

                </select>

            </div>

            <div class="form-group">

                <label for="model">

                    AI Model

                </label>

                <select id="model">

                    <option>ChatGPT</option>
                    <option>Claude</option>
                    <option>Gemini</option>

                </select>

            </div>

            <div class="form-group">

                <label for="language">

                    Output Language

                </label>

                <select id="language">

                    <option>English</option>
                    <option>Bahasa Indonesia</option>

                </select>

            </div>

            <button class="primary-button">

                Generate Prompt

            </button>

        </section>

        <!-- ================================= -->
        <!-- Preview -->
        <!-- ================================= -->

        <aside class="generated-prompt">

            <h2>Generated Prompt</h2>

            <div class="empty-state">

                <h3>

                    Every great prompt begins with an idea.

                </h3>

                <p>

                    Your generated prompt will appear here after you press Generate.

                </p>

            </div>

        </aside>

    </main>

    <!-- ===================================== -->
    <!-- Footer -->
    <!-- ===================================== -->

    <footer class="site-footer">

        <div class="container">

            <small>

                Crafted with ☕ by

                <strong>

                    Syaima Levantine

                </strong>

            </small>

        </div>

    </footer>

    <!-- JavaScript -->

    <script
        type="module"
        src="js/app.js">

    </script>

</body>

</html>

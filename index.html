<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>AI Prompt Studio</title>

    <meta
        name="description"
        content="Type Ideas into Perfect Prompts">

    <meta
        name="author"
        content="Syaima Levantine">

    <!-- Theme -->
    <meta
        name="theme-color"
        content="#F8F6F1">

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- Header -->
    <!-- ===================================== -->

    <header>

        <h1>AI Prompt Studio</h1>

        <p>Type Ideas into Perfect Prompts</p>

    </header>

    <!-- ===================================== -->
    <!-- Main -->
    <!-- ===================================== -->

    <main>

        <!-- ================================= -->
        <!-- Workspace -->
        <!-- ================================= -->

        <section id="workspace">

            <h2>Workspace</h2>

            <!-- Prompt Type -->
            <div class="field">

                <label for="promptType">

                    Prompt Type

                </label>

                <select id="promptType">

                    <option value="general">
                        General
                    </option>

                    <option value="creative">
                        Creative Writing
                    </option>

                    <option value="marketing">
                        Marketing
                    </option>

                    <option value="coding">
                        Programming
                    </option>

                    <option value="translation">
                        Translation
                    </option>

                </select>

            </div>

            <!-- Goal -->

            <div class="field">

                <label for="goal">

                    Goal

                </label>

                <input
                    id="goal"
                    type="text"
                    placeholder="What do you want AI to do?">

            </div>

            <!-- Context -->

            <div class="field">

                <label for="context">

                    Context

                </label>

                <textarea
                    id="context"
                    rows="8"
                    placeholder="Describe your project..."></textarea>

            </div>

            <!-- Generate -->

            <button id="generateButton">

                Generate Prompt

            </button>

        </section>

        <!-- ================================= -->
        <!-- Preview -->
        <!-- ================================= -->

        <aside id="preview">

            <h2>Generated Prompt</h2>

            <textarea
                id="output"
                rows="18"
                readonly
                placeholder="Your generated prompt will appear here..."></textarea>

            <button id="copyButton">

                Copy Prompt

            </button>

        </aside>

    </main>

    <!-- ===================================== -->
    <!-- Footer -->
    <!-- ===================================== -->

    <footer>

        <small>

            © 2025 AI Prompt Studio

            <br>

            Designed by

            <strong>

                Syaima Levantine

            </strong>

        </small>

    </footer>

    <!-- JavaScript -->

    <script type="module" src="js/app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>AI Prompt Studio</title>

    <meta
        name="description"
        content="Type Ideas into Perfect Prompts">

    <meta
        name="author"
        content="Syaima Levantine">

    <!-- Theme -->
    <meta
        name="theme-color"
        content="#F8F6F1">

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- Header -->
    <!-- ===================================== -->

    <header>

        <h1>AI Prompt Studio</h1>

        <p>Type Ideas into Perfect Prompts</p>

    </header>

    <!-- ===================================== -->
    <!-- Main -->
    <!-- ===================================== -->

    <main>

        <!-- ============================= -->
        <!-- Workspace -->
        <!-- ============================= -->

        <section id="workspace">

            <h2>Workspace</h2>

            <label for="promptType">
                Prompt Type
            </label>

            <select id="promptType">

                <option>General</option>
                <option>Marketing</option>
                <option>Programming</option>
                <option>Writing</option>

            </select>

            <label for="goal">
                Goal
            </label>

            <input
                type="text"
                id="goal"
                placeholder="What do you want AI to do?">

            <label for="audience">
                Audience
            </label>

            <input
                type="text"
                id="audience"
                placeholder="Who is this for?">

            <label for="tone">
                Tone
            </label>

            <input
                type="text"
                id="tone"
                placeholder="Professional, Friendly, Casual...">

            <label for="length">
                Length
            </label>

            <select id="length">

                <option>Short</option>
                <option selected>Medium</option>
                <option>Long</option>

            </select>

            <button id="generateButton">

                Generate Prompt

            </button>

        </section>

        <!-- ============================= -->
        <!-- Preview -->
        <!-- ============================= -->

        <aside id="preview">

            <h2>Preview</h2>

            <textarea
                id="result"
                readonly
                placeholder="Your generated prompt will appear here..."></textarea>

            <button id="copyButton">

                Copy Prompt

            </button>

        </aside>

    </main>

    <!-- ===================================== -->
    <!-- Footer -->
    <!-- ===================================== -->

    <footer>

        <small>

            © 2025 AI Prompt Studio

            <br>

            Designed by
            <strong>Syaima Levantine</strong>

        </small>

    </footer>

    <!-- JavaScript -->

    <script type="module" src="js/app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Prompt Studio</title>

<meta
name="description"
content="Type Ideas into Perfect Prompts">

<meta
name="author"
content="Syaima Levantine">

<meta
name="theme-color"
content="#F8F6F1">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header class="site-header">

<div class="container">

<h1>AI Prompt Studio</h1>

<p class="tagline">

Type Ideas into Perfect Prompts

</p>

</div>

</header>

<main class="container app-layout">

<section class="prompt-canvas">

<h2>Prompt Canvas</h2>

<p class="section-description">

Transform your ideas into clear and effective AI prompts.

</p>

<div class="form-group">

<label for="idea">

Your Idea

</label>

<textarea
id="idea"
placeholder="Describe your idea here..."></textarea>

</div>

<div class="form-group">

<label for="tone">

Tone

</label>

<select id="tone">

<option>Professional</option>
<option>Friendly</option>
<option>Creative</option>
<option>Formal</option>
<option>Casual</option>

</select>

</div>

<div class="form-group">

<label for="model">

AI Model

</label>

<select id="model">

<option>ChatGPT</option>
<option>Claude</option>
<option>Gemini</option>

</select>

</div>

<div class="form-group">

<label for="language">

Output Language

</label>

<select id="language">

<option>English</option>
<option>Bahasa Indonesia</option>

</select>

</div>

<button
id="generateButton"
class="primary-button">

Generate Prompt

</button>

</section>

<aside
id="previewPanel"
class="generated-prompt">

<h2>

Generated Prompt

</h2>

<div
id="previewContent"
class="empty-state">

<h3>

Every great prompt begins with an idea.

</h3>

<p>

Your generated prompt will appear here after you press Generate.

</p>

</div>

<div class="preview-actions">

<button
id="copyButton"
class="primary-button"
disabled>

Copy Prompt

</button>

<button
id="clearButton"
class="primary-button"
disabled>

Clear

</button>

</div>

</aside>

</main>

<footer class="site-footer">

<div class="container">

<small>

Crafted with ☕ by

<strong>

Syaima Levantine

</strong>

</small>

</div>

</footer>

<script
type="module"
src="js/app.js">

</script>

</body>

</html>

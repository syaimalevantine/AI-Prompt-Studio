<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Prompt Studio</title>

<meta
name="description"
content="Type Ideas into Perfect Prompts">

<meta
name="author"
content="Syaima Levantine">

<meta
name="theme-color"
content="#F8F6F1">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css?v=2">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header class="site-header">

<div class="container">

<h1>AI Prompt Studio</h1>

<p class="tagline">

Type Ideas into Perfect Prompts

</p>
<div class="ui-language-control">
  <select id="uiLanguage">
    <option value="ar">العربية</option>
    <option value="id">Bahasa Indonesia</option>
    <option value="tr">Türkçe</option>
    <option value="en">English</option>
  </select>
</div>

</div>

</header>

<main class="container app-layout">

<section class="prompt-canvas">

<h2>Prompt Canvas</h2>

<p class="section-description">

Transform your ideas into clear and effective AI prompts.

</p>

<div class="form-group">

<label for="idea">

Your Idea

</label>

<textarea
    id="idea"
    maxlength="500"
    placeholder="Describe your idea here..."
></textarea>

<p id="characterCounter" class="character-counter">

0 / 500

</p>

</div>

<div class="form-group">

<label for="tone">

Tone

</label>

<select id="tone">

<option>Professional</option>
<option>Friendly</option>
<option>Creative</option>
<option>Formal</option>
<option>Casual</option>

</select>

</div>

<div class="form-group">

<label for="model">
    Target AI
</label>

<select id="model">
    <option>ChatGPT</option>
    <option>Claude</option>
    <option>Gemini</option>
    <option>DALL·E</option>
    <option>Midjourney</option>
    <option>Canva AI</option>
</select>

</div>

<div class="form-group">

<label for="language">

Output Language

</label>

<select id="language">
<option value="ar">العربية</option>
<option value="id">Bahasa Indonesia</option>
<option value="en" selected>English</option>
<option value="tr">Türkçe</option>
</select>

</div>

<button
id="generateButton"
class="primary-button">

Generate Prompt

</button>

</section>

<aside
id="previewPanel"
class="generated-prompt">

<h2>

Generated Prompt

</h2>

<div
id="previewContent"
class="empty-state">

<h3>

Every great prompt begins with an idea.

</h3>

<p>

Your generated prompt will appear here after you press Generate.

</p>

</div>

<div class="preview-actions">

<button
id="copyButton"
class="primary-button"
disabled>

Copy Prompt

</button>

<button
id="clearButton"
class="primary-button"
disabled>

Clear

</button>

</div>

</aside>

</main>

<footer class="site-footer">

<div class="container">

<small>

Crafted with ☕ by

<strong>

Syaima Levantine

</strong>

</small>

</div>

</footer>

<script
type="module"
src="js/app.js?v=2"

</script>

</body>

</html>
